<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>MarIA — Sin conexión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-family: 'Outfit', sans-serif; background-color: #0a0e1a; color: #e2e8f0; height: 100%; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        min-height: 100vh; padding: 24px; text-align: center;
        background: radial-gradient(ellipse 60% 50% at 50% 45%, rgba(0,229,200,0.06) 0%, transparent 70%);
      }
      .icon { width: 64px; height: 64px; margin-bottom: 24px; opacity: 0.8; }
      h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; color: #ffffff; margin-bottom: 8px; letter-spacing: 0.02em; }
      p { font-size: 0.875rem; color: #6b7a99; max-width: 320px; line-height: 1.6; margin-bottom: 24px; }
      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 10px 20px; border-radius: 12px; border: 1px solid rgba(0,229,200,0.2);
        background: rgba(0,229,200,0.08); color: #00e5c8;
        font-family: 'Outfit', sans-serif; font-size: 0.8125rem; font-weight: 500;
        cursor: pointer; text-decoration: none; transition: all 0.2s ease;
      }
      .btn:hover { background: rgba(0,229,200,0.12); border-color: rgba(0,229,200,0.35); }
    </style>
  </head>
  <body>
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#00e5c8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 14a1 1 0 1 1 1 1 1 1 0 0 1-1-1zm0-4V7"/>
    </svg>
    <h1>Sin conexión</h1>
    <p>MarIA necesita una conexión a internet para responder tus consultas. Verifica tu red e inténtalo de nuevo.</p>
    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"></polyline>
        <polyline points="23 20 23 14 17 14"></polyline>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
      </svg>
      Reintentar
    </button>
  </body>
</html>
